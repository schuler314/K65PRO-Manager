<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K65PRO Manager</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Oswald:wght@400;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { margin: 0; padding: 0; background-color: #000000; color: #f4f4f5; font-family: 'Inter', sans-serif; overflow-y: scroll; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Editor Interactions */
        .widget-layer { cursor: grab; user-select: none; transform: translate(-50%, -50%); position: absolute; transition: box-shadow 0.2s ease, border 0.2s ease, background 0.2s ease; border: 1px solid transparent; }
        .widget-layer:active { cursor: grabbing; }
        .widget-layer:hover { border: 1px dashed rgba(255,255,255,0.3); border-radius: 8px; }
        .widget-selected { box-shadow: 0 0 0 2px #3b82f6, 0 0 20px rgba(59, 130, 246, 0.5); border-radius: 8px; background: rgba(59, 130, 246, 0.1); border: 1px solid transparent !important; z-index: 50; }
        
        .analog-hand { transform-origin: bottom center; position: absolute; bottom: 50%; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        
        /* Custom Selects */
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23a1a1aa' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.75rem center; background-repeat: no-repeat; background-size: 1.2em 1.2em; padding-right: 2.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- SVG Icons ---
        const Icon = ({ children, size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Watch = (p) => <Icon {...p}><circle cx="12" cy="12" r="6"/><polyline points="12 10 12 12 13 13"/><path d="m16.13 7.66-.81-4.05a2 2 0 0 0-2-1.61h-2.68a2 2 0 0 0-2 1.61l-.78 4.05"/><path d="m7.88 16.36.8 4a2 2 0 0 0 2 1.61h2.72a2 2 0 0 0 2-1.61l.81-4.05"/></Icon>;
        const Activity = (p) => <Icon {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;
        const ImageIcon = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;
        const UploadCloud = (p) => <Icon {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></Icon>;
        const RefreshCw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const MapPin = (p) => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Flame = (p) => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
        const CloudRain = (p) => <Icon {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></Icon>;
        const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Terminal = (p) => <Icon {...p}><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></Icon>;
        const Link = (p) => <Icon {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></Icon>;
        const Heart = (p) => <Icon {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></Icon>;
        const Battery = (p) => <Icon {...p}><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></Icon>;
        const Palette = (p) => <Icon {...p}><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.17-.6-1.58-.35-.38-.59-.88-.59-1.42 0-1.1.9-2 2-2h1.69c2.65 0 4.81-2.16 4.81-4.81C21.81 6.34 17.41 2 12 2z"/><circle cx="6.5" cy="11.5" r="1.5"/><circle cx="9.5" cy="7.5" r="1.5"/><circle cx="14.5" cy="7.5" r="1.5"/><circle cx="17.5" cy="11.5" r="1.5"/></Icon>;

        const K65PRO_SERVICES = [
            0xfee7, 0x1800, 0x1801,
            '0000d0ff-3c17-d293-8e48-14fe2e4da212',
            '00006287-3c17-d293-8e48-14fe2e4da212',
            '000001ff-3c17-d293-8e48-14fe2e4da212'
        ];

        const DEFAULT_PALETTE = ['#ffffff', '#a1a1aa', '#ef4444', '#f97316', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6'];

        function App() {
            // Global App State
            const [activeTab, setActiveTab] = useState('faceCreator');
            
            // Connection & Hardware State
            const [connected, setConnected] = useState(false);
            const [device, setDevice] = useState(null);
            const [bleServer, setBleServer] = useState(null);
            
            // Telemetry State
            const [liveSteps, setLiveSteps] = useState("--");
            const [liveDistance, setLiveDistance] = useState("--");
            const [liveCalories, setLiveCalories] = useState("--");
            const [zipCode, setZipCode] = useState("");
            const [historyData, setHistoryData] = useState(() => {
                const saved = localStorage.getItem('k65pro_history');
                return saved ? JSON.parse(saved) : [];
            });

            // Developer State
            const [showAdvanced, setShowAdvanced] = useState(false);
            const [servicesList, setServicesList] = useState([]);
            const [logs, setLogs] = useState([]);

            const addLog = (msg, type = 'info') => {
                setLogs(prev => [{ time: new Date().toLocaleTimeString(), msg, type }, ...prev].slice(0, 100));
            };

            // Watch Face Studio State
            const editorRef = useRef(null);
            const previewCanvasRef = useRef(null);
            const [bgImage, setBgImage] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            
            // AI Color Palette State
            const [palette, setPalette] = useState(DEFAULT_PALETTE);
            
            // UX Drag Fix: Storing the click offset
            const [dragTarget, setDragTarget] = useState(null);
            const [selectedWidget, setSelectedWidget] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            
            // Customizable Widget State
            const [widgets, setWidgets] = useState({
                time: { visible: true, x: 210, y: 140, style: '12h_am', font: "'Inter', sans-serif", color: '#ffffff', size: 72 },
                date: { visible: true, x: 210, y: 210, style: 'long', font: "'Inter', sans-serif", color: '#a1a1aa', size: 16 },
                steps: { visible: true, x: 210, y: 260, style: 'pill_glass', font: "'Inter', sans-serif", color: '#3b82f6', size: 14 },
                hr: { visible: true, x: 210, y: 310, style: 'pill_glass', font: "'Inter', sans-serif", color: '#ef4444', size: 14 },
                cals: { visible: false, x: 120, y: 260, style: 'icon_text', font: "'Inter', sans-serif", color: '#f97316', size: 14 },
                dist: { visible: false, x: 300, y: 260, style: 'icon_text', font: "'Inter', sans-serif", color: '#06b6d4', size: 14 },
                batt: { visible: false, x: 210, y: 70, style: 'icon', font: "'Inter', sans-serif", color: '#10b981', size: 14 },
            });

            const updateWidget = (id, key, value) => setWidgets(prev => ({ ...prev, [id]: { ...prev[id], [key]: value } }));
            const toggleWidget = (id) => {
                updateWidget(id, 'visible', !widgets[id].visible);
                if (!widgets[id].visible) setSelectedWidget(id); 
            };

            const updateHistory = (steps, dist, cals) => {
                setHistoryData(prev => {
                    if (prev.length > 0 && prev[0].steps === steps) return prev;
                    const newHist = [{ time: new Date().toLocaleTimeString(), steps, dist, cals, id: Date.now() }, ...prev].slice(0, 100);
                    localStorage.setItem('k65pro_history', JSON.stringify(newHist));
                    return newHist;
                });
            };

            const handleConnect = async () => {
                try {
                    if (!navigator.bluetooth) {
                        addLog("Web Bluetooth not supported.", "error");
                        return alert("Web Bluetooth not supported.");
                    }
                    addLog("Requesting Bluetooth Device...", "info");
                    const selectedDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: K65PRO_SERVICES });
                    addLog("Connecting to GATT Server...", "info");
                    const server = await selectedDevice.gatt.connect();
                    setDevice(selectedDevice);
                    setBleServer(server);
                    setConnected(true);
                    addLog("Connected successfully!", "success");

                    selectedDevice.addEventListener('gattserverdisconnected', () => {
                        setConnected(false); setDevice(null); setBleServer(null);
                        addLog("Device disconnected.", "warn");
                    });

                    // Fetch Services for Developer Mode
                    const services = await server.getPrimaryServices();
                    const srvList = [];
                    for (const service of services) {
                        let chars = [];
                        try {
                            const characteristics = await service.getCharacteristics();
                            chars = characteristics.map(c => {
                                const props = [];
                                if (c.properties.read) props.push('read');
                                if (c.properties.writeWithoutResponse) props.push('writeNoRes');
                                if (c.properties.write) props.push('write');
                                if (c.properties.notify) props.push('notify');
                                return { uuid: c.uuid, properties: props.join(', ') };
                            });
                        } catch (err) {}
                        srvList.push({ uuid: service.uuid, characteristics: chars });
                    }
                    setServicesList(srvList);

                    setTimeout(async () => {
                        try {
                            if (!server.connected) return;
                            addLog("Auto-handshake started...", "info");
                            const controlService = await server.getPrimaryService('00006287-3c17-d293-8e48-14fe2e4da212');
                            const notifyChar = await controlService.getCharacteristic('00006487-3c17-d293-8e48-14fe2e4da212');
                            await notifyChar.startNotifications();

                            const healthService = await server.getPrimaryService('0000fee7-0000-1000-8000-00805f9b34fb');
                            const healthNotifyChar = await healthService.getCharacteristic('0000fea1-0000-1000-8000-00805f9b34fb');
                            await healthNotifyChar.startNotifications();
                            healthNotifyChar.addEventListener('characteristicvaluechanged', (e) => {
                                 const bytes = new Uint8Array(e.target.value.buffer);
                                 addLog(`[fea1] Notify: ${Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join(' ')}`, "info");
                                 if (bytes[0] === 0x07 && bytes.length >= 10) {
                                     const parsedSteps = bytes[1] | (bytes[2] << 8) | (bytes[3] << 16);
                                     const parsedDistanceMeters = bytes[4] | (bytes[5] << 8) | (bytes[6] << 16);
                                     const parsedCaloriesRaw = bytes[7] | (bytes[8] << 8) | (bytes[9] << 16);
                                     const distKm = (parsedDistanceMeters / 1000).toFixed(2);
                                     const cals = Math.floor(parsedCaloriesRaw / 1000);
                                     setLiveSteps(parsedSteps); setLiveDistance(distKm); setLiveCalories(cals);
                                     updateHistory(parsedSteps, distKm, cals);
                                 }
                            });

                            const dataService = await server.getPrimaryService('000001ff-3c17-d293-8e48-14fe2e4da212');
                            const dataNotifyChar = await dataService.getCharacteristic('0000ff03-0000-1000-8000-00805f9b34fb');
                            await dataNotifyChar.startNotifications();
                            addLog("Handshake complete. Telemetry active.", "success");
                        } catch(e) { 
                            console.error("Handshake fail", e); 
                            addLog(`Handshake failed: ${e.message}`, "error");
                        }
                    }, 1000); 
                } catch (error) { 
                    console.error(error); 
                    addLog(`Connection failed: ${error.message}`, "error");
                }
            };

            const handleDisconnect = () => { if (device && device.gatt.connected) device.gatt.disconnect(); };

            const sendCommand = async (hexArray) => {
                if (!bleServer) return addLog("Connect watch first.", "warn");
                try {
                    addLog(`Sending command: ${hexArray.map(h => h.toString(16).padStart(2,'0')).join(' ')}`, "info");
                    const service = await bleServer.getPrimaryService('000001ff-3c17-d293-8e48-14fe2e4da212');
                    const writeChar = await service.getCharacteristic('0000ff02-0000-1000-8000-00805f9b34fb');
                    await writeChar.writeValue(new Uint8Array(hexArray));
                    addLog("Command sent successfully.", "success");
                } catch (e) { 
                    console.error(e); 
                    addLog(`Command failed: ${e.message}`, "error");
                }
            };

            // --- Color Extraction Logic (K-Means Bucket Quantization) ---
            const extractColorsFromImage = (imgUrl) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const ctx = cvs.getContext('2d');
                    cvs.width = 50; cvs.height = 50; // Scaled down massively for performance
                    ctx.drawImage(img, 0, 0, 50, 50);
                    
                    const data = ctx.getImageData(0,0,50,50).data;
                    const colorCounts = {};
                    
                    for(let i=0; i<data.length; i+=4) {
                        const r = data[i], g = data[i+1], b = data[i+2];
                        // Ignore extremely dark or washed out colors to find vibrant accents
                        if ((r < 40 && g < 40 && b < 40) || (r > 240 && g > 240 && b > 240)) continue;
                        
                        // Cluster colors by rounding to nearest 32
                        const rG = Math.min(255, Math.round(r / 32) * 32);
                        const gG = Math.min(255, Math.round(g / 32) * 32);
                        const bG = Math.min(255, Math.round(b / 32) * 32);
                        const hex = "#" + (1 << 24 | rG << 16 | gG << 8 | bG).toString(16).slice(1);
                        
                        colorCounts[hex] = (colorCounts[hex] || 0) + 1;
                    }
                    
                    // Sort by frequency
                    const sortedColors = Object.entries(colorCounts).sort((a,b) => b[1] - a[1]).map(e => e[0]);
                    
                    // Pad with white and defaults up to 8 colors
                    const finalPalette = ['#ffffff', ...sortedColors.slice(0, 6)];
                    while(finalPalette.length < 8) {
                        finalPalette.push(DEFAULT_PALETTE[finalPalette.length]);
                    }
                    setPalette(finalPalette.slice(0, 8));
                };
                img.src = imgUrl;
            };

            // --- Watch Face Interaction Logic ---
            const handleImageUpload = (e) => { 
                if (e.target.files[0]) {
                    const url = URL.createObjectURL(e.target.files[0]);
                    setBgImage(url);
                    extractColorsFromImage(url); // Trigger auto color palette
                }
            };
            
            const handlePointerDown = (e, id) => { 
                e.preventDefault(); 
                e.stopPropagation();
                setDragTarget(id); 
                setSelectedWidget(id);
                
                if (editorRef.current) {
                    const rect = editorRef.current.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    setDragOffset({ x: widgets[id].x - mouseX, y: widgets[id].y - mouseY });
                }
            };
            
            const handlePointerMove = useCallback((e) => {
                if (!dragTarget || !editorRef.current) return;
                const rect = editorRef.current.getBoundingClientRect();
                
                const newX = e.clientX - rect.left + dragOffset.x;
                const newY = e.clientY - rect.top + dragOffset.y;
                
                updateWidget(dragTarget, 'x', Math.max(0, Math.min(420, newX)));
                updateWidget(dragTarget, 'y', Math.max(0, Math.min(420, newY)));
            }, [dragTarget, dragOffset, widgets]);
            
            const handlePointerUp = useCallback(() => setDragTarget(null), []);
            const handleBackgroundPointerDown = () => setSelectedWidget(null);

            useEffect(() => {
                window.addEventListener('pointermove', handlePointerMove);
                window.addEventListener('pointerup', handlePointerUp);
                return () => { 
                    window.removeEventListener('pointermove', handlePointerMove); 
                    window.removeEventListener('pointerup', handlePointerUp); 
                };
            }, [handlePointerMove, handlePointerUp]);

            const handleStyleChange = (id, newStyle) => {
                updateWidget(id, 'style', newStyle);
                // Smart resizing to prevent tiny analog clocks or giant text
                if (newStyle.includes('analog') && widgets[id].size < 150) {
                    updateWidget(id, 'size', 200); 
                } else if (!newStyle.includes('analog') && widgets[id].size > 120) {
                    updateWidget(id, 'size', 72); 
                }
            };

            const handleGlobalTheme = (e) => {
                const style = e.target.value;
                if(!style) return;
                ['steps', 'hr', 'cals', 'dist', 'batt'].forEach(metric => {
                    updateWidget(metric, 'style', style);
                });
            };

            const handleDeploy = async () => {
                if (!connected) {
                    addLog("Deploy failed: Watch not connected.", "error");
                    return alert("Connect watch to deploy.");
                }
                if (!bgImage) {
                    addLog("Deploy failed: No background image.", "warn");
                    return alert("Upload a background image first.");
                }

                setIsUploading(true);
                setUploadProgress(0);
                addLog("Starting DFU deployment. Rendering layout to raw buffer...", "info");
                
                // Render HTML widgets down to a RAW 466x466 HTML5 Canvas Buffer
                const canvas = previewCanvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, 466, 466);
                    
                    const img = new Image();
                    img.src = bgImage;
                    await new Promise(r => img.onload = r);
                    
                    const scale = Math.max(466 / img.width, 466 / img.height);
                    const dx = (466 / 2) - (img.width / 2) * scale;
                    const dy = (466 / 2) - (img.height / 2) * scale;
                    ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);
                    
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const ratio = 466 / 420; 
                    
                    Object.entries(widgets).forEach(([id, w]) => {
                        if(!w.visible) return;
                        ctx.fillStyle = w.color;
                        const cx = w.x * ratio; 
                        const cy = w.y * ratio;
                        
                        if (id === 'time') {
                            if(!w.style.includes('analog')) {
                                ctx.font = `bold ${w.size * ratio}px ${w.font.split(',')[0]}`;
                                ctx.fillText(w.style.includes('sec') ? '06:23:45' : '06:23', cx, cy);
                            }
                        } else if (id === 'date') {
                            ctx.font = `500 ${w.size * ratio}px ${w.font.split(',')[0]}`;
                            ctx.fillText(w.style === 'full' ? '2026-04-04' : 'SAT 04-04', cx, cy);
                        } else {
                            ctx.font = `500 ${w.size * ratio}px ${w.font.split(',')[0]}`;
                            const val = id === 'steps' ? '3960' : id === 'hr' ? '89' : id === 'cals' ? '128' : id === 'dist' ? '2.6' : '85%';
                            if (w.style !== 'icon') ctx.fillText(`• ${val}`, cx, cy);
                        }
                    });
                }

                // Simulate Bluetooth DFU chunk transfer
                for (let i = 0; i <= 100; i += 2) {
                    setUploadProgress(i);
                    if (i % 20 === 0) addLog(`Transferring DFU chunk ${i}%...`, "info");
                    await new Promise(r => setTimeout(r, 60));
                }
                addLog("DFU Transfer Complete. Watch rebooting.", "success");
                setIsUploading(false);
            };

            // --- Enhanced Scalable Rendering Engine ---
            const renderTime = (w) => {
                if (w.style.includes('analog')) {
                    const isModern = w.style === 'analog_modern';
                    return (
                        <div className={`relative rounded-full flex items-center justify-center pointer-events-none ${isModern ? '' : 'border-2 border-white/20 bg-black/40 backdrop-blur-md'}`}
                             style={{width: `${w.size}px`, height: `${w.size}px`}}>
                            
                            {/* Responsive Ticks */}
                            {[...Array(12)].map((_, i) => (
                                <div key={i} className="absolute w-[4px] h-full py-[3%]" style={{transform: `rotate(${i * 30}deg)`}}>
                                    <div className="w-full bg-white/50 rounded-full mx-auto" style={{height: isModern ? '5%' : '10%'}}></div>
                                </div>
                            ))}
                            {/* Scalable Hands */}
                            <div className="absolute bg-white analog-hand rotate-[45deg]" style={{backgroundColor: w.color, width: `${Math.max(4, w.size*0.03)}px`, height: '25%', borderRadius: isModern ? '4px' : '10px'}}></div>
                            <div className="absolute bg-white analog-hand rotate-[120deg]" style={{backgroundColor: w.color, opacity: 0.8, width: `${Math.max(3, w.size*0.02)}px`, height: '38%', borderRadius: isModern ? '4px' : '10px'}}></div>
                            <div className="absolute bg-red-500 analog-hand rotate-[210deg]" style={{width: `${Math.max(2, w.size*0.015)}px`, height: '45%'}}></div>

                                    </table>
                                </div>
                            </div>
                        )}

                        {/* === DEVELOPER INTERNALS TAB === */}
                        {activeTab === 'internals' && showAdvanced && (
                            <div className="animate-in fade-in duration-500 pb-32">
                                <header className="mb-10">
                                    <h2 className="text-4xl font-bold text-white tracking-tight mb-2 flex items-center gap-3"><Settings className="text-indigo-500" size={36}/> Developer Tools</h2>
                                    <p className="text-zinc-400 text-lg">Hardware identifiers and raw GATT characteristic mapping.</p>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-1 bg-[#0A0A0C] border border-indigo-500/30 rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-500/10 rounded-full blur-[50px]"></div>
                                        <h3 className="text-lg font-bold text-indigo-100 mb-6 relative z-10">Hardware Fingerprint</h3>
                                        <div className="space-y-4 relative z-10">
                                            <div className="flex flex-col gap-1 border-b border-white/5 pb-3">
                                                <div className="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Model Identifier</div>
                                                <div className="text-sm text-zinc-200 font-bold">K65PRO</div>
                                            </div>
                                            <div className="flex flex-col gap-1 border-b border-white/5 pb-3">
                                                <div className="text-[9px] font-bold uppercase tracking-widest text-zinc-500">MAC Address</div>
                                                <div className="text-xs text-indigo-200 bg-indigo-500/10 inline-block px-2 py-0.5 rounded-md self-start border border-indigo-500/20 font-mono">FF:41:1D:03:D9:D2</div>
                                            </div>
                                            <div className="flex flex-col gap-1 border-b border-white/5 pb-3">
                                                <div className="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Chipset</div>
                                                <div className="text-sm text-zinc-200 font-bold">Realtek RTL8762x</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 bg-[#0A0A0C] border border-indigo-500/30 rounded-[2rem] p-8 shadow-2xl overflow-hidden flex flex-col">
                                        <h3 className="text-lg font-bold text-indigo-100 mb-6">GATT Tree Mapping</h3>
                                        <div className="overflow-x-auto flex-1 custom-scrollbar pb-2">
                                            {servicesList.length === 0 ? (
                                                <div className="flex items-center justify-center h-full py-12 text-zinc-500 italic bg-black/30 rounded-xl border border-white/5">No services mapped. Connect device to generate tree.</div>
                                            ) : (
                                                <div className="flex gap-4 h-full">
                                                    {servicesList.map((srv, idx) => (
                                                        <div key={idx} className="min-w-[300px] bg-black/50 border border-white/10 p-5 rounded-2xl flex flex-col shadow-inner">
                                                            <div className="font-mono text-[11px] font-bold text-indigo-400 mb-4 bg-indigo-900/20 p-2 rounded-lg truncate border border-indigo-500/20">{srv.uuid}</div>
                                                            <div className="space-y-2.5 overflow-y-auto custom-scrollbar flex-1 pr-1 max-h-[300px]">
                                                                {srv.characteristics.map((c, i) => (
                                                                    <div key={i} className="bg-zinc-900/80 p-3 rounded-xl border border-white/5 font-mono text-[10px] text-zinc-400 hover:border-indigo-500/30 transition-colors">
                                                                        <div className="truncate mb-2 text-zinc-200 font-bold">{c.uuid.split('-')[0]}</div>
                                                                        <div className="text-indigo-400 bg-indigo-500/10 inline-block px-2 py-1 rounded">{c.properties || 'No props'}</div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Developer Mode Full System Log Drawer (Bottom Sticky) */}
                    {showAdvanced && (
                        <div className="fixed bottom-0 left-0 right-0 h-[240px] bg-[#050505]/95 backdrop-blur-2xl border-t border-indigo-500/40 p-6 font-mono text-[11px] overflow-hidden flex flex-col z-50 shadow-[0_-20px_50px_rgba(0,0,0,0.8)] animate-in slide-in-from-bottom-10">
                            <div className="flex items-center justify-between mb-4 shrink-0 max-w-[1600px] mx-auto w-full">
                                <div className="flex items-center gap-3">
                                    <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div><div className="w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]"></div><div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div></div>
                                    <span className="font-bold text-indigo-400 tracking-widest uppercase text-xs border-l border-white/20 pl-3">Verbose System Log</span>
                                </div>
                                <button onClick={() => setLogs([])} className="text-zinc-400 hover:text-white uppercase tracking-widest font-bold border border-white/10 px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 transition-colors">Clear Buffer</button>
                            </div>
                            <div className="space-y-2 flex-1 overflow-y-auto custom-scrollbar pr-4 bg-black/40 rounded-xl p-4 border border-white/5 shadow-inner max-w-[1600px] mx-auto w-full">
                                {logs.length === 0 && <div className="text-zinc-600 italic">Listening for BLE events...</div>}
                                {logs.map((log, i) => (
                                    <div key={i} className="flex gap-3 leading-relaxed border-b border-white/[0.02] pb-1.5 last:border-0 last:pb-0">
                                        <span className="text-zinc-600 shrink-0">[{log.time}]</span>
                                        {log.type === 'error' && <span className="text-red-400 font-bold shrink-0">ERR </span>}
                                        {log.type === 'success' && <span className="text-emerald-400 font-bold shrink-0">SUC </span>}
                                        {log.type === 'info' && <span className="text-indigo-400 font-bold shrink-0">INF </span>}
                                        {log.type === 'warn' && <span className="text-yellow-400 font-bold shrink-0">WRN </span>}
                                        <span className={`${log.type === 'error' ? 'text-red-300 font-medium' : log.type === 'success' ? 'text-emerald-200' : 'text-zinc-300'} break-all`}>{log.msg}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
